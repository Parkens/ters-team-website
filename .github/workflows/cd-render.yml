name: CD (Render, tag-gated)

on:
  push:
    tags:
      - "v*.*.*" # деплой только при публикации тега

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy_production:
    name: Deploy to Render (production) [tag-gated]
    runs-on: ubuntu-latest
    environment: production

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main:refs/remotes/origin/main
          echo "Tag ref: $GITHUB_REF"
          echo "Tag name: $GITHUB_REF_NAME"

          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF")"
          MAIN_COMMIT="$(git rev-parse refs/remotes/origin/main)"

          echo "Tag commit:  $TAG_COMMIT"
          echo "Main commit: $MAIN_COMMIT"

          if [ "$TAG_COMMIT" = "$MAIN_COMMIT" ]; then
            echo "OK: tag commit equals main HEAD."
          else
            echo "ERROR: tag commit does NOT equal main HEAD. Refusing to deploy."
            exit 1
          fi

      # Разрешаем semver + pre release
      - name: Validate semver tag vX.Y.Z
        env:
          TAG: ${{ github.ref_name }}   # имя тега (v0.2.1, v0.2.2 и т.д.)
        run: |
          echo "Tag: $TAG"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag must match vX.Y.Z or vX.Y.Z-<pre> (e.g. v1.2.3, v1.2.3-rc.1). Got: $TAG"
            exit 1
          fi

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK"
            exit 1
          fi

          for i in 1 2 3; do
            echo "Triggering Render deploy (attempt $i)..."
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK" || true)
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Deploy triggered (HTTP $code)."
              exit 0
            fi
            echo "Render hook failed (HTTP $code). Retrying..."
            sleep 5
          done

          echo "Render deploy hook failed after retries."
          exit 1
      
      # Базовые проверки готовности
      - name: Smoke test (wait + readiness)
        env:
          PROD_SMOKE_URL: ${{ secrets.PROD_SMOKE_URL }}
        run: |
          if [ -z "$PROD_SMOKE_URL" ]; then
            echo "Missing secret: PROD_SMOKE_URL (e.g. https://www.ters-team.com/readyz)"
            exit 1
          fi

          echo "Waiting for deployment to roll out..."
          sleep 20

          for i in $(seq 1 24); do
            echo "Smoke check attempt $i: $PROD_SMOKE_URL"
            code=$(curl -L -s -o /dev/null -w "%{http_code}" "$PROD_SMOKE_URL" || true)

            if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
              echo "Smoke test OK (HTTP $code)."
              exit 0
            fi

            echo "Not ready yet (HTTP $code). Waiting..."
            sleep 10
          done

          echo "Smoke test FAILED: service didn't become ready in time."
          exit 1
