name: CI/CD (Render, tag-gated)

on:
  pull_request:
    branches: ["main"]

  push:
    branches: ["main"]
    tags:
      - "v*.*.*" # деплой только при публикации тега
permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: CI (docker build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Билдим как Render (контекст cloud/render + Dockerfile)
      - name: Docker build (CI)
        uses: docker/build-push-action@v6
        with:
          context: cloud/render
          file: cloud/render/Dockerfile
          load: true
          tags: ters-team-website:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_production:
    name: Deploy to Render (production) [tag-gated]
    needs: [ci]
    runs-on: ubuntu-latest
    environment: production

    # Запускаем только на push тега вида vX.Y.Z
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Validate semver tag vX.Y.Z
        env:
          TAG: ${{ github.ref_name }}   # для push тега это имя тега (v0.2.1, v0.2.2 и т.д.)
        run: |
          echo "Tag: $TAG"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag must match vX.Y.Z (e.g. v1.2.3). Got: $TAG"
            exit 1
          fi

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK"
            exit 1
          fi

          for i in 1 2 3; do
            echo "Triggering Render deploy (attempt $i)..."
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK" || true)
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Deploy triggered (HTTP $code)."
              exit 0
            fi
            echo "Render hook failed (HTTP $code). Retrying..."
            sleep 5
          done

          echo "Render deploy hook failed after retries."
          exit 1

      - name: Smoke test (wait + healthz)
        env:
          PROD_SMOKE_URL: ${{ secrets.PROD_SMOKE_URL }}
        run: |
          if [ -z "$PROD_SMOKE_URL" ]; then
            echo "Missing secret: PROD_SMOKE_URL (e.g. https://www.ters-team.com/healthz)"
            exit 1
          fi

          echo "Waiting for deployment to roll out..."
          sleep 20

          for i in $(seq 1 24); do
            echo "Smoke check attempt $i: $PROD_SMOKE_URL"
            code=$(curl -L -s -o /dev/null -w "%{http_code}" "$PROD_SMOKE_URL" || true)

            if [ "$code" = "200" ]; then
              echo "Smoke test OK (HTTP 200)."
              exit 0
            fi

            echo "Not ready yet (HTTP $code). Waiting..."
            sleep 10
          done

          echo "Smoke test FAILED: service didn't become healthy in time."
          exit 1
