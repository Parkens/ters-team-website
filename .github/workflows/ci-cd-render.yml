name: CI/CD (Render, prod-gated by SemVer tag)

on:
  pull_request:
    branches: ["main"]

  push:
    branches: ["main"]
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

  ci:
    name: CI (docker build)
    runs-on: ubuntu-latest
    # не гоняем CI второй раз при tag push
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (CI)
        uses: docker/build-push-action@v6
        with:
          context: cloud/render
          file: cloud/render/Dockerfile
          load: true
          tags: ters-team-website:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_production:
    name: Deploy to Render (production)
    runs-on: ubuntu-latest
    environment: production

    # деплой только на semver tag
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # handmade prod gate: тег должен указывать на commit из main
      - name: Verify tag commit is in main
        run: |
          git fetch origin main
          TAG_COMMIT=$(git rev-list -n 1 $GITHUB_REF)
          echo "Tag commit: $TAG_COMMIT"

          if git merge-base --is-ancestor $TAG_COMMIT origin/main; then
            echo "Tag commit belongs to main ✔"
          else
            echo "Tag does NOT belong to main. Blocking deploy."
            exit 1
          fi

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK"
            exit 1
          fi

          for i in 1 2 3; do
            echo "Triggering Render deploy (attempt $i)..."
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK" || true)
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Deploy triggered (HTTP $code)."
              break
            fi
            echo "Render hook failed (HTTP $code). Retrying..."
            sleep 5
          done

      - name: Smoke test (wait + healthz)
        env:
          PROD_SMOKE_URL: ${{ secrets.PROD_SMOKE_URL }}
        run: |
          if [ -z "$PROD_SMOKE_URL" ]; then
            echo "Missing secret: PROD_SMOKE_URL"
            exit 1
          fi

          echo "Waiting for rollout..."
          sleep 20

          for i in $(seq 1 24); do
            echo "Smoke check attempt $i"
            code=$(curl -L -s -o /dev/null -w "%{http_code}" "$PROD_SMOKE_URL" || true)

            if [ "$code" = "200" ]; then
              echo "Smoke OK"
              exit 0
            fi

            echo "Not ready ($code)"
            sleep 10
          done

          echo "Smoke test failed"
          exit 1
