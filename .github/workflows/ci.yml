name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  docker-nginx-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/render

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ters-nginx:${{ github.sha }} .

      - name: Validate nginx config (nginx -t)
        run: |
          docker run --rm ters-nginx:${{ github.sha }} nginx -t
