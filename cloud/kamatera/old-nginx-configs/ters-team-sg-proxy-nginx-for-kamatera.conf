upstream wix_origin {
    # Wix, как и раньше
    server 185.230.63.107:443;
}

# 80 порт – сразу переводим на HTTPS + канонизация на www

# все не-www запросы посылаем на www (HTTP)
server {
    listen 80;
    server_name ters-team.com;

    return 301 https://www.ters-team.com$request_uri;
}

# www на HTTP посылаем до www на HTTPS
server {
    listen 80;
    server_name www.ters-team.com;

    return 301 https://www.ters-team.com$request_uri;
}

# 443 порт – редирект ters-team.com на www.ters-team.com

server {
    listen 443 ssl http2;
    server_name ters-team.com;

    # те же самые сертификаты, что и для основного сервера
    ssl_certificate     /etc/letsencrypt/live/ters-team.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ters-team.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.ters-team.com$request_uri;
}

# Основной сервер: https://www.ters-team.com

server {
    listen 443 ssl http2;
    server_name www.ters-team.com;

    # SSL от Certbot
    ssl_certificate     /etc/letsencrypt/live/ters-team.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ters-team.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Основной прокси на Wix
    location / {
        proxy_pass              https://wix_origin;

        # пробрасываем реальный хост и клиента
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host $host;

        proxy_ssl_server_name   on;
        proxy_ssl_name          $host;
        proxy_http_version      1.1;

        proxy_buffering         on;
        proxy_redirect          off;

        # незжатый ответ для sub_filter
        proxy_set_header        Accept-Encoding "";

        sub_filter_types        text/html text/css;
        sub_filter_once         off;

        sub_filter "https://static.wixstatic.com/media/" "/wix-media/";
        sub_filter "//static.wixstatic.com/media/"        "/wix-media/";
    }

    # Прокси для картинок (и прочей статики)
    # с Wix CDN через /wix-media/
    location ^~ /wix-media/ {
        resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

        # Клиент:  /wix-media/media/....jpg
        # Wix:     /media/....jpg
        proxy_pass            https://static.wixstatic.com/media/;

        proxy_set_header      Host static.wixstatic.com;
        proxy_ssl_server_name on;
        proxy_http_version    1.1;
        proxy_buffering       on;
        proxy_read_timeout    60s;

        # Кеш nginx
        proxy_cache           wix_cache;
        proxy_cache_valid     200 301 302 1h;
        proxy_ignore_headers  Cache-Control Expires Set-Cookie;
        add_header            X-Proxy-Cache $upstream_cache_status;

        # Кеш браузера
        expires               30d;
        add_header            Cache-Control "public";
    }
}
