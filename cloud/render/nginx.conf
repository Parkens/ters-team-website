worker_processes 1;

events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
    resolver_timeout 2s;

    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # mark internal/system probe endpoints for observability
    map $request_uri $is_probe {
        default 0;
        /healthz 1;
        /readyz 1;
        /_readyz_upstream 1;
    }

    # structured JSON access log for Grafana Alloy / Loki
    log_format ters_json escape=json
    '{'
      '"ts":"$time_iso8601",'
      '"host":"$host",'
      '"remote_addr":"$remote_addr",'
      '"x_forwarded_for":"$http_x_forwarded_for",'
      '"request_method":"$request_method",'
      '"request_uri":"$request_uri",'
      '"status":$status,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_connect_time":"$upstream_connect_time",'
      '"upstream_header_time":"$upstream_header_time",'
      '"upstream_response_time":"$upstream_response_time",'
      '"referer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"request_id":"$request_id",'
      '"is_probe":$is_probe'
    '}';

    upstream wix_origin {
        # Wix site-host
        zone wix_origin 64k;
        server andyparkens.wixsite.com:443 resolve;
        keepalive 32;
    }

    # default
    server {
        listen 80 default_server;
        server_name _;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        return 301 https://www.ters-team.com$request_uri;
    }

    # redirect from apex to www
    server {
        listen 80;
        server_name ters-team.com;
        return 301 https://www.ters-team.com$request_uri;
    }

    # main server www.ters-team.com
    server {
        listen 80;
        server_name www.ters-team.com;

        add_header X-Proxy-By render-nginx always;

        # main structured access log for Grafana Alloy / Loki
        access_log /var/log/nginx/access.json ters_json;

        # keep error log in stderr for container-native debugging
        error_log /dev/stderr warn;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location = /readyz {
            access_log off;

            # internal check
            auth_request /_readyz_upstream;

            default_type text/plain;
            return 200 "ok\n";
        }

        location = /_readyz_upstream {
            internal;
            access_log off;

            # check the website root
            proxy_pass https://wix_origin/;

            proxy_set_header Host www.ters-team.com;
            proxy_set_header Accept-Encoding "";

            proxy_ssl_server_name on;
            proxy_ssl_name        andyparkens.wixsite.com;

            proxy_connect_timeout 2s;
            proxy_read_timeout    2s;

            proxy_method GET;

            # without the body (the status is enough)
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            # any errors except 2xx and 3xx will be shown as readiness error
            proxy_intercept_errors on;
            error_page 400 401 403 404 405 408 429 500 502 503 504 = @readyz_fail;
        }

        location @readyz_fail {
            default_type text/plain;
            return 503 "upstream not ready\n";
        }

        # main proxy
        location / {
            proxy_pass              https://wix_origin;

            proxy_set_header        Host www.ters-team.com;

            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header        X-Forwarded-Proto https;
            proxy_set_header        X-Forwarded-Host www.ters-team.com;

            proxy_ssl_server_name   on;
            proxy_ssl_name          andyparkens.wixsite.com;

            proxy_http_version      1.1;
            proxy_set_header        Connection "";

            proxy_buffering         on;
            proxy_redirect          off;

            proxy_connect_timeout   5s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;

            # disable compression from upstream so sub_filter can rewrite body content
            proxy_set_header        Accept-Encoding "";

            sub_filter_types        text/css application/javascript text/javascript application/json;
            sub_filter_once         off;

            sub_filter "https://frog.wix.com/"               "/wix-telemetry/frog/";
            sub_filter "//frog.wix.com/"                     "/wix-telemetry/frog/";
            sub_filter "https:\/\/frog.wix.com\/"            "\/wix-telemetry\/frog\/";

            sub_filter "https://panorama.wixapps.net/"       "/wix-telemetry/panorama/";
            sub_filter "//panorama.wixapps.net/"             "/wix-telemetry/panorama/";
            sub_filter "https:\/\/panorama.wixapps.net\/"    "\/wix-telemetry\/panorama\/";
        }

        # frog/panorama - quick response
        location ^~ /wix-telemetry/ {
            access_log off;
            add_header Cache-Control "no-store" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            return 204;
        }
    }
}
