worker_processes 1;

events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
    resolver_timeout 2s;

    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream wix_origin {
        # Wix site-host
        zone wix_origin 64k;
        server andyparkens.wixsite.com:443 resolve;
        keepalive 32;
    }

    # дефолтный сервер
    server {
        listen 80 default_server;
        server_name _;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        return 301 https://www.ters-team.com$request_uri;
    }

    # редирект с голого домена на www
    server {
        listen 80;
        server_name ters-team.com;
        return 301 https://www.ters-team.com$request_uri;
    }

    # основной сервер www.ters-team.com
    server {
        listen 80;
        server_name www.ters-team.com;

        add_header X-Proxy-By render-nginx always;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location = /readyz {
            access_log off;

            # внутренняя проверка
            auth_request /_readyz_upstream;

            default_type text/plain;
            return 200 "ok\n";
        }

        location = /_readyz_upstream {
            internal;
            access_log off;

            # проверяем корень сайта (как трафик пользователя)
            proxy_pass https://wix_origin/;

            # upstream должен видеть свой Host
            proxy_set_header Host andyparkens.wixsite.com;

            proxy_set_header Accept-Encoding "";

            proxy_ssl_server_name on;
            proxy_ssl_name        andyparkens.wixsite.com;

            # чуть мягче таймауты, чтобы readiness не флапал на редких задержках сети
            proxy_connect_timeout 5s;
            proxy_read_timeout    5s;

            proxy_method GET;

            # без тела запроса (достаточно статуса)
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            # любые коды кроме 2xx и 3xx считаем за ошибку готовности
            proxy_intercept_errors on;
            error_page 400 401 403 404 405 408 429 500 502 503 504 = @readyz_fail;
        }

        location @readyz_fail {
            default_type text/plain;
            return 503 "upstream not ready\n";
        }

        # основной прокси
        location / {
            proxy_pass              https://wix_origin;

            # upstream должен видеть свой Host
            proxy_set_header        Host andyparkens.wixsite.com;

            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;

            # сохраняем корректную схему/хост внешнего запроса
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        X-Forwarded-Host  $host;

            proxy_ssl_server_name   on;
            proxy_ssl_name          andyparkens.wixsite.com;

            proxy_http_version      1.1;
            proxy_set_header        Connection "";

            proxy_buffering         on;
            proxy_redirect          off;

            proxy_connect_timeout   5s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;

            proxy_set_header        Accept-Encoding "";

            sub_filter_types        text/html text/css;
            sub_filter_once         off;

            sub_filter "https://static.wixstatic.com/media/" "/wix-media/";
            sub_filter "//static.wixstatic.com/media/"        "/wix-media/";

            sub_filter "https://frog.wix.com/"               "/wix-telemetry/frog/";
            sub_filter "//frog.wix.com/"                      "/wix-telemetry/frog/";
            sub_filter "https://panorama.wixapps.net/"        "/wix-telemetry/panorama/";
            sub_filter "//panorama.wixapps.net/"              "/wix-telemetry/panorama/";
        }

        # frog/panorama - быстрый ответ
        location ^~ /wix-telemetry/ {
            access_log off;
            default_type text/plain;
            add_header Cache-Control "no-store" always;
            return 204;
        }

        # прокси для картинок с Wix CDN
        location ^~ /wix-media/ {
            access_log off;

            proxy_pass            https://static.wixstatic.com/media/;
            proxy_set_header      Host static.wixstatic.com;
            proxy_ssl_server_name on;

            proxy_http_version    1.1;
            proxy_set_header      Connection "";
            proxy_buffering       on;

            proxy_connect_timeout  5s;
            proxy_read_timeout     60s;
        }
    }
}
