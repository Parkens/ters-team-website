worker_processes 1;

events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
    resolver_timeout 2s;

    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # cache для Wix-ресурсов
    proxy_cache_path /var/cache/nginx/wix levels=1:2 keys_zone=WIXCACHE:20m max_size=300m inactive=7d use_temp_path=off;

    # если апстрим вернул Set-Cookie - не кешируем
    map $upstream_http_set_cookie $no_cache_set_cookie {
        default 0;
        "~."    1;
    }

    upstream wix_origin {
        # Wix site-host
        zone wix_origin 64k;
        server andyparkens.wixsite.com:443 resolve;
        keepalive 32;
    }

    # дефолтный сервер
    server {
        listen 80 default_server;
        server_name _;

        # healthcheck для Render/мониторинга
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # всё остальное отправляем на канонический домен
        return 301 https://www.ters-team.com$request_uri;
    }

    # редирект с голого домена на www (чтобы минимизировать редиректы)
    server {
        listen 80;
        server_name ters-team.com;

        return 301 https://www.ters-team.com$request_uri;
    }

    # основной сервер www.ters-team.com
    server {
        listen 80;
        server_name www.ters-team.com;

        add_header X-Proxy-By render-nginx always;

        # healthcheck для Render/мониторинга
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # frog/panorama - быстрый ответ, чтобы Thunderbolt не ждал внешние домены
        location ^~ /wix-telemetry/ {
            access_log off;
            default_type text/plain;
            add_header X-Telemetry-Stub 1 always; # для проверок
            return 204;
        }

        # Wix static (JS/CSS) + кеш (стабилизация Китая/РФ)
        location ^~ /wix-static/ {
            access_log off;

            proxy_pass            https://static.parastorage.com/;
            proxy_set_header      Host static.parastorage.com;
            proxy_ssl_server_name on;

            proxy_http_version    1.1;
            proxy_set_header      Connection "";
            proxy_buffering       on;

            # ретраи/таймауты
            proxy_connect_timeout  3s;
            proxy_read_timeout     60s;
            proxy_next_upstream    error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            proxy_cache           WIXCACHE;
            proxy_cache_key       $scheme$proxy_host$request_uri;
            proxy_cache_valid     200 301 302 7d;
            proxy_cache_valid     206 7d;
            proxy_cache_valid     404 1m;

            proxy_cache_lock           on;
            proxy_cache_lock_timeout   5s;
            proxy_cache_background_update on;
            proxy_cache_use_stale      error timeout updating http_500 http_502 http_503 http_504;

            proxy_cache_methods   GET HEAD; # чтобы случайно не кешировать POST
            proxy_no_cache        $http_authorization $no_cache_set_cookie;
            proxy_cache_bypass    $http_authorization;

            add_header            X-Wix-Cache $upstream_cache_status always;

            # клиентский кеш для статики
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable" always;
        }

        # Wix Thunderbolt (JS runtime) - кеш + подмена telemetry
        location ^~ /_partials/ {
            access_log off;

            proxy_pass              https://wix_origin;

            # Wix ожидает конкретный Host
            proxy_set_header        Host www.ters-team.com;

            proxy_ssl_server_name   on;
            proxy_ssl_name          andyparkens.wixsite.com;

            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_buffering         on;
            proxy_redirect          off;

            proxy_connect_timeout   3s;
            proxy_read_timeout      60s;
            proxy_next_upstream     error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            proxy_cache             WIXCACHE;
            proxy_cache_key         $scheme$proxy_host$request_uri;
            proxy_cache_valid       200 301 302 7d;
            proxy_cache_valid       206 7d;

            proxy_cache_lock            on;
            proxy_cache_lock_timeout    5s;
            proxy_cache_background_update on;
            proxy_cache_use_stale       error timeout updating http_500 http_502 http_503 http_504;

            proxy_cache_methods     GET HEAD;
            proxy_no_cache          $http_authorization $no_cache_set_cookie;
            proxy_cache_bypass      $http_authorization;

            add_header              X-Wix-Cache $upstream_cache_status always;

            # незжатый ответ от Wix для sub_filter (только в _partials, чтобы не сломать остальной JS сайта)
            proxy_set_header        Accept-Encoding "";

            # Wix telemetry (frog/panorama) переписываем только внутри thunderbolt
            sub_filter_types        application/javascript;
            sub_filter_once         off;
            sub_filter "https://frog.wix.com/"               "/wix-telemetry/frog/";
            sub_filter "//frog.wix.com/"                      "/wix-telemetry/frog/";
            sub_filter "https://panorama.wixapps.net/"        "/wix-telemetry/panorama/";
            sub_filter "//panorama.wixapps.net/"              "/wix-telemetry/panorama/";
        }

        # прокси для картинок с Wix CDN
        location ^~ /wix-media/ {
            access_log off;

            proxy_pass            https://static.wixstatic.com/media/;
            proxy_set_header      Host static.wixstatic.com;
            proxy_ssl_server_name on;

            proxy_http_version    1.1;
            proxy_set_header      Connection "";
            proxy_buffering       on;
            proxy_read_timeout    60s;

            proxy_connect_timeout  3s;
            proxy_next_upstream    error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            proxy_cache           WIXCACHE;
            proxy_cache_key       $scheme$proxy_host$request_uri;
            proxy_cache_valid     200 301 302 30d;
            proxy_cache_valid     206 30d;

            proxy_cache_lock           on;
            proxy_cache_lock_timeout   5s;
            proxy_cache_background_update on;
            proxy_cache_use_stale      error timeout updating http_500 http_502 http_503 http_504;

            proxy_cache_methods   GET HEAD;
            proxy_no_cache        $http_authorization $no_cache_set_cookie;
            proxy_cache_bypass    $http_authorization;

            add_header            X-Wix-Cache $upstream_cache_status always;

            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
        }

        # основной прокси
        location / {
            proxy_pass              https://wix_origin;

            proxy_set_header        Host www.ters-team.com;

            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;

            # фиксируем https
            proxy_set_header        X-Forwarded-Proto https;
            proxy_set_header        X-Forwarded-Host www.ters-team.com;

            proxy_ssl_server_name   on;
            proxy_ssl_name          andyparkens.wixsite.com;

            proxy_http_version      1.1;
            proxy_set_header        Connection "";

            proxy_buffering         on;
            proxy_redirect          off;

            proxy_connect_timeout   3s;
            proxy_read_timeout      60s;
            proxy_next_upstream     error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            # незжатый ответ от Wix для sub_filter
            proxy_set_header        Accept-Encoding "";

            # подменяем ссылки на картинки (HTML/CSS)
            sub_filter_types        text/html text/css application/javascript;
            sub_filter_once         off;

            # картинки с Wix
            sub_filter "https://static.wixstatic.com/media/" "/wix-media/";
            sub_filter "//static.wixstatic.com/media/"        "/wix-media/";

            # Wix telemetry (frog/panorama) в Китае иногда грузится долго
            sub_filter "https://frog.wix.com/"               "/wix-telemetry/frog/";
            sub_filter "//frog.wix.com/"                      "/wix-telemetry/frog/";
            sub_filter "https://panorama.wixapps.net/"        "/wix-telemetry/panorama/";
            sub_filter "//panorama.wixapps.net/"              "/wix-telemetry/panorama/";

            # Wix static (JS/CSS) - подмена на кешируемый маршрут
            sub_filter "https://static.parastorage.com/"      "/wix-static/";
            sub_filter "//static.parastorage.com/"             "/wix-static/";
        }
    }
}
